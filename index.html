<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Stick Fight PRO</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;overflow:hidden;}
canvas{width:100%;height:60vh;background:linear-gradient(#444,#111);display:block;}

.hud{display:flex;justify-content:space-between;padding:5px;font-size:12px;}
.barra{width:120px;height:10px;background:#333;margin-bottom:3px;}
.vida{background:lime;height:100%;}
.super{background:orange;height:100%;}

.controls{position:fixed;bottom:5px;width:100%;display:flex;justify-content:space-between;padding:0 10px;}
.player{display:flex;gap:6px;}
button{width:55px;height:45px;border:none;border-radius:10px;font-size:16px;}
.move{background:#555;color:white;}
.soco{background:red;color:white;}
.superBtn{background:orange;color:black;}

.toggle{position:absolute;top:5px;right:5px;background:#444;color:white;}

#fim{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;align-items:center;justify-content:center;
flex-direction:column;z-index:999;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggle2P()">👥</button>

<div class="hud">
<div>AZUL
<div class="barra"><div id="vida1" class="vida"></div></div>
<div class="barra"><div id="super1" class="super"></div></div>
</div>

<div>VERMELHO
<div class="barra"><div id="vida2" class="vida"></div></div>
<div class="barra"><div id="super2" class="super"></div></div>
</div>
</div>

<canvas id="game"></canvas>

<div id="fim">
<h1 id="textoFim"></h1>
<button onclick="reset()">🔄 Jogar novamente</button>
</div>

<div class="controls">

<div class="player">
<button id="p1left">⬅️</button>
<button id="p1jump">⬆️</button>
<button id="p1right">➡️</button>
<button id="p1atk">👊</button>
<button id="p1sup">⚡</button>
</div>

<div class="player" id="p2controls" style="display:none;">
<button id="p2left">⬅️</button>
<button id="p2jump">⬆️</button>
<button id="p2right">➡️</button>
<button id="p2atk">👊</button>
<button id="p2sup">⚡</button>
</div>

</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight*0.6;
}
resize();

function create(x){
return{x,y:0,vy:0,life:100,super:0,tomouDano:false};
}

let p1=create(150);
let p2=create(400);

let keys={p1:{},p2:{}};
let twoPlayers=false;
let gameOver=false;

// 🎮 TECLADO COMPLETO
document.addEventListener("keydown",e=>{

// P1
if(e.key.toLowerCase()=="a")keys.p1.left=true;
if(e.key.toLowerCase()=="d")keys.p1.right=true;
if(e.key.toLowerCase()=="w")keys.p1.jump=true;
if(e.key.toLowerCase()=="f")keys.p1.atk=true;
if(e.key.toLowerCase()=="g")keys.p1.sup=true;

// P2
if(e.key=="ArrowLeft")keys.p2.left=true;
if(e.key=="ArrowRight")keys.p2.right=true;
if(e.key=="ArrowUp")keys.p2.jump=true;
if(e.key.toLowerCase()=="k")keys.p2.atk=true;
if(e.key.toLowerCase()=="l")keys.p2.sup=true;

});

document.addEventListener("keyup",e=>{

if(e.key.toLowerCase()=="a")keys.p1.left=false;
if(e.key.toLowerCase()=="d")keys.p1.right=false;
if(e.key.toLowerCase()=="w")keys.p1.jump=false;
if(e.key.toLowerCase()=="f")keys.p1.atk=false;
if(e.key.toLowerCase()=="g")keys.p1.sup=false;

if(e.key=="ArrowLeft")keys.p2.left=false;
if(e.key=="ArrowRight")keys.p2.right=false;
if(e.key=="ArrowUp")keys.p2.jump=false;
if(e.key.toLowerCase()=="k")keys.p2.atk=false;
if(e.key.toLowerCase()=="l")keys.p2.sup=false;

});

// TOUCH
function bind(id,p,a){
let b=document.getElementById(id);
b.addEventListener("touchstart",e=>{e.preventDefault();keys[p][a]=true;});
b.addEventListener("touchend",()=>{keys[p][a]=false;});
}

bind("p1left","p1","left");
bind("p1right","p1","right");
bind("p1jump","p1","jump");
bind("p1atk","p1","atk");
bind("p1sup","p1","sup");

bind("p2left","p2","left");
bind("p2right","p2","right");
bind("p2jump","p2","jump");
bind("p2atk","p2","atk");
bind("p2sup","p2","sup");

function ground(){return c.height*0.7;}

function physics(p){
p.vy+=0.8;
p.y+=p.vy;
if(p.y>0){p.y=0;p.vy=0;}

if(p.life<100 && !p.tomouDano){
p.life+=0.05;
if(p.life>100)p.life=100;
}
p.tomouDano=false;
}

// IA
function ai(){
if(twoPlayers||gameOver)return;

let dist=Math.abs(p2.x-p1.x);

if(dist>120){
if(p2.x>p1.x)p2.x-=3;
else p2.x+=3;
}

if(dist<120 && Math.random()<0.3){
p1.life-=2;
p1.tomouDano=true;
}
}

function control(){
if(gameOver)return;

if(keys.p1.left)p1.x-=5;
if(keys.p1.right)p1.x+=5;
if(keys.p1.jump && p1.vy===0)p1.vy=-12;

if(twoPlayers){
if(keys.p2.left)p2.x-=5;
if(keys.p2.right)p2.x+=5;
if(keys.p2.jump && p2.vy===0)p2.vy=-12;
}

// ATAQUE
if(keys.p1.atk && Math.abs(p1.x-p2.x)<120){
p2.life-=1;
p2.tomouDano=true;
p1.super=Math.min(100,p1.super+1);
}

if(twoPlayers && keys.p2.atk && Math.abs(p1.x-p2.x)<120){
p1.life-=1;
p1.tomouDano=true;
p2.super=Math.min(100,p2.super+1);
}

// SUPER
if(keys.p1.sup && p1.super>=100){
p2.life-=20;
p2.tomouDano=true;
p1.super=0;
}

if(twoPlayers && keys.p2.sup && p2.super>=100){
p1.life-=20;
p1.tomouDano=true;
p2.super=0;
}
}

function draw(p,color){
let x=p.x,y=ground()+p.y;

ctx.strokeStyle=color;
ctx.lineWidth=3;

ctx.beginPath();
ctx.arc(x,y-80,10,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y-70);
ctx.lineTo(x,y-30);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y-55);
ctx.lineTo(x-20,y-40);
ctx.moveTo(x,y-55);
ctx.lineTo(x+20,y-40);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y-30);
ctx.lineTo(x-15,y);
ctx.moveTo(x,y-30);
ctx.lineTo(x+15,y);
ctx.stroke();
}

function checkFim(){
if(p1.life<=0)mostrarFim(twoPlayers?"🔴 Vermelho venceu":"💀 Você perdeu");
if(p2.life<=0)mostrarFim(twoPlayers?"🔵 Azul venceu":"🏆 Você venceu");
}

function mostrarFim(t){
gameOver=true;
fim.style.display="flex";
textoFim.innerText=t;
}

function reset(){
p1=create(150);
p2=create(400);
gameOver=false;
fim.style.display="none";
}

function loop(){
ctx.clearRect(0,0,c.width,c.height);

physics(p1);
physics(p2);
control();
ai();

draw(p1,"cyan");
draw(p2,"red");

vida1.style.width=p1.life+"%";
vida2.style.width=p2.life+"%";
super1.style.width=p1.super+"%";
super2.style.width=p2.super+"%";

checkFim();

requestAnimationFrame(loop);
}

function toggle2P(){
twoPlayers=!twoPlayers;
p2controls.style.display=twoPlayers?"flex":"none";
}

loop();
</script>

</body>
</html>
